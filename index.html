<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroGestión Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --sidebar-color: #1b4332; /* Verde profundo del logo */
            --accent-color: #74c69d;
            --bg-light: #f8f9fa;
            --text-main: #2d4059;
        }
        body { background-color: var(--bg-light); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; }
        
        /* Sidebar lateral como el de la imagen */
        .sidebar { width: 250px; background-color: var(--sidebar-color); height: 100vh; position: fixed; color: white; padding: 20px; }
        .main-content { margin-left: 250px; width: 100%; padding: 30px; }
        
        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-img { width: 80px; filter: brightness(1.2); }
        
        .nav-link { color: rgba(255,255,255,0.7); margin: 10px 0; border-radius: 10px; padding: 12px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }

        .card-premium { border: none; border-radius: 20px; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .card-premium:hover { transform: translateY(-5px); }

        .btn-agro { background-color: var(--sidebar-color); color: white; border-radius: 12px; padding: 12px 25px; border: none; font-weight: 600; }
        .btn-agro:hover { background-color: #2d6a4f; color: white; }

        .timeline-item { border-left: 2px solid var(--accent-color); padding-left: 20px; position: relative; margin-bottom: 15px; }
        .timeline-item::before { content: ""; position: absolute; left: -7px; top: 5px; width: 12px; height: 12px; background: var(--accent-color); border-radius: 50%; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">
        <i class="bi bi-alpha text-success" style="font-size: 3rem;"></i>
        <h4 class="mt-2 fw-bold" style="letter-spacing: 2px;">AGROGESTION</h4>
    </div>
    <nav class="nav flex-column">
        <a class="nav-link active" href="#"><i class="bi bi-grid-1x2-fill me-2"></i> Dashboard</a>
        <a class="nav-link" href="#"><i class="bi bi-map me-2"></i> Mis Lotes</a>
        <a class="nav-link" href="#"><i class="bi bi-calendar-event me-2"></i> Ciclos</a>
        <a class="nav-link" href="#"><i class="bi bi-wallet2 me-2"></i> Finanzas</a>
    </nav>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Resumen de Producción</h2>
            <p class="text-muted small">Bienvenida de nuevo, Leidyd</p>
        </div>
        <button class="btn btn-agro" data-bs-toggle="modal" data-bs-target="#modalRegistro">+ Nuevo Registro</button>
    </div>

    <div class="row g-4 mb-5" id="contenedorLotes">
        </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card card-premium p-4">
                <h5 class="fw-bold mb-3">Registrar Siembra Anterior</h5>
                <p class="small text-muted">Usa esto para cargar datos de cultivos que ya están en tierra.</p>
                <form id="formHistorial">
                    <select class="form-select mb-3 bg-light border-0" id="loteH" required>
                        <option value="Rolon Kue">Rolon Kue</option>
                        <option value="Lote Central">Lote Central</option>
                    </select>
                    <input type="text" class="form-control mb-3 bg-light border-0" id="cultivoH" placeholder="¿Qué se sembró?">
                    <label class="small fw-bold">Fecha de Siembra</label>
                    <input type="date" class="form-control mb-3 bg-light border-0" id="fechaSH">
                    <button type="submit" class="btn btn-agro w-100">Cargar al Historial</button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card card-premium p-4">
                <h5 class="fw-bold mb-4">Bitácora de Campo</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr class="text-muted">
                                <th>Fecha</th>
                                <th>Lote</th>
                                <th>Actividad</th>
                                <th class="text-end">Inversión</th>
                            </tr>
                        </thead>
                        <tbody id="tablaActividad"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
