<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROGESTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root { --dark-green: #1b4332; --mid-green: #2d6a4f; --accent: #b5ead7; --bg: #f0f2f5; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; color: #333; margin: 0; display: flex; }
        
        /* Menu Lateral Estilo Harvest */
        .sidebar { width: 260px; background: var(--dark-green); min-height: 100vh; position: fixed; color: white; padding: 25px; }
        .main { margin-left: 260px; width: 100%; padding: 40px; }
        
        .logo-box { text-align: center; margin-bottom: 40px; }
        .logo-icon { font-size: 3rem; color: var(--accent); line-height: 1; }
        .logo-text { font-weight: 700; letter-spacing: 2px; font-size: 1.2rem; margin-top: 10px; }

        /* Tarjetas de Lotes */
        .lote-card { 
            background: white; border: none; border-radius: 20px; 
            padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            transition: 0.3s; border-left: 8px solid var(--mid-green);
        }
        .lote-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }

        .btn-add { background: var(--dark-green); color: white; border-radius: 12px; padding: 10px 20px; font-weight: 600; border: none; }
        .btn-add:hover { background: var(--mid-green); color: white; }
        
        .status-pill { background: #e9f5ee; color: var(--dark-green); padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; }
        .action-btn { cursor: pointer; padding: 5px; border-radius: 5px; transition: 0.2s; }
        .action-btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-box">
        <div class="logo-icon"><i class="bi bi-alpha"></i></div>
        <div class="logo-text">AGROGESTION</div>
    </div>
    <div class="mt-4">
        <p class="small opacity-50 text-uppercase fw-bold">Menú</p>
        <div class="nav flex-column">
            <a href="#" class="nav-link text-white px-0"><i class="bi bi-grid-1x2-fill me-2"></i> Dashboard</a>
            <a href="#" class="nav-link text-white opacity-50 px-0"><i class="bi bi-calendar-check me-2"></i> Reportes</a>
        </div>
    </div>
</div>

<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold m-0">Producción por Lote</h2>
            <p class="text-muted">Control de hectáreas y ciclos de siembra</p>
        </div>
        <button class="btn btn-add" onclick="modalLote.show()">+ Nuevo Lote</button>
    </div>

    <div class="row g-4" id="contenedorLotes">
        </div>
</div>

<div class="modal fade" id="modalLote" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0" style="border-radius: 25px;">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-4">Configurar Lote</h5>
                <form id="formLote">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="small fw-bold">Nombre del Lote</label>
                        <input type="text" id="nombreLote" class="form-control border-0 bg-light" placeholder="Ej: Rolon Kue" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="small fw-bold">Hectáreas Totales</label>
                            <input type="number" id="haTotales" class="form-control border-0 bg-light" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="small fw-bold">Hectáreas Sembradas</label>
                            <input type="number" id="haSembradas" class="form-control border-0 bg-light" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">Cultivo Actual</label>
                        <select id="cultivo" class="form-select border-0 bg-light">
                            <option value="Soja">Soja (120 días)</option>
                            <option value="Maiz">Maíz (150 días)</option>
                            <option value="Yerba Mate">Yerba Mate</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">Fecha de Siembra</label>
                        <input type="date" id="fechaS" class="form-control border-0 bg-light">
                    </div>
                    <button type="submit" class="btn btn-add w-100 mt-3">GUARDAR LOTE</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDow_HqFuXPHSEtaV2RsuqQuy6utIakOCo",
        authDomain: "agrogestion-163d2.firebaseapp.com",
        projectId: "agrogestion-163d2",
        storageBucket: "agrogestion-163d2.firebasestorage.app",
        messagingSenderId: "83410520563",
        appId: "1:83410520563:web:0de6a6b74d8adbc1206a86"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const modalLote = new bootstrap.Modal(document.getElementById('modalLote'));
    window.modalLote = modalLote;

    // --- CARGAR DATOS EN TIEMPO REAL ---
    onSnapshot(query(collection(db, "lotes"), orderBy("nombre")), (snapshot) => {
        const contenedor = document.getElementById('contenedorLotes');
        contenedor.innerHTML = '';
        snapshot.forEach((doc) => {
            const l = doc.data();
            const id = doc.id;
            
            // Cálculo de cosecha rápida
            const diasCosecha = l.cultivo === "Soja" ? 120 : (l.cultivo === "Maiz" ? 150 : 365);
            let fechaCosecha = "Sin fecha";
            if(l.fechaS) {
                let f = new Date(l.fechaS);
                f.setDate(f.getDate() + diasCosecha);
                fechaCosecha = f.toLocaleDateString();
            }

            contenedor.innerHTML += `
                <div class="col-md-6 col-xl-4">
                    <div class="lote-card">
                        <div class="d-flex justify-content-between mb-3">
                            <span class="status-pill">${l.haTotales} HA TOTALES</span>
                            <div>
                                <i class="bi bi-pencil-square text-primary me-2 action-btn" onclick="prepararEdicion('${id}', '${l.nombre}', ${l.haTotales}, ${l.haSembradas}, '${l.cultivo}', '${l.fechaS}')"></i>
                                <i class="bi bi-trash text-danger action-btn" onclick="eliminarLote('${id}')"></i>
                            </div>
                        </div>
                        <h4 class="fw-bold mb-1">${l.nombre}</h4>
                        <p class="text-muted small">Sembrado: <strong>${l.haSembradas} ha</strong> de <strong>${l.cultivo}</strong></p>
                        <hr>
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="small">
                                <div class="text-muted">Est. Cosecha:</div>
                                <div class="fw-bold text-success">${fechaCosecha}</div>
                            </div>
                            <div class="text-end">
                                <button class="btn btn-sm btn-light fw-bold" style="border-radius:10px">Ver Historial</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    });

    // --- GUARDAR / ACTUALIZAR ---
    document.getElementById('formLote').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const datos = {
            nombre: document.getElementById('nombreLote').value,
            haTotales: Number(document.getElementById('haTotales').value),
            haSembradas: Number(document.getElementById('haSembradas').value),
            cultivo: document.getElementById('cultivo').value,
            fechaS: document.getElementById('fechaS').value
        };

        if(id) {
            await updateDoc(doc(db, "lotes", id), datos);
        } else {
            await addDoc(collection(db, "lotes"), datos);
        }
        
        modalLote.hide();
        document.getElementById('formLote').reset();
        document.getElementById('editId').value = '';
    });

    // --- EDITAR ---
    window.prepararEdicion = (id, nombre, haT, haS, cult, fecha) => {
        document.getElementById('editId').value = id;
        document.getElementById('nombreLote').value = nombre;
        document.getElementById('haTotales').value = haT;
        document.getElementById('haSembradas').value = haS;
        document.getElementById('cultivo').value = cult;
        document.getElementById('fechaS').value = fecha;
        modalLote.show();
    };

    // --- ELIMINAR ---
    window.eliminarLote = async (id) => {
        if(confirm("¿Borrar este lote y todo su historial?")) {
            await deleteDoc(doc(db, "lotes", id));
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
