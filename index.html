<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroGestión - Leidyd</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --pastel-green: #e1eedd;
            --pastel-blue: #deecff;
            --pastel-pink: #ffdee9;
            --dark-text: #2d4059;
        }
        body { 
            background-color: #f8f9fa; 
            color: var(--dark-text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .header-app { 
            background: linear-gradient(135deg, var(--pastel-pink), var(--pastel-blue)); 
            padding: 30px; 
            border-radius: 0 0 25px 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .card-custom { 
            border: none; 
            border-radius: 20px; 
            background-color: white; 
        }
        .btn-save { 
            background-color: #b5ead7; 
            border: none; 
            font-weight: bold; 
            color: #4b645a; 
            padding: 15px; 
            border-radius: 12px;
            transition: 0.3s;
        }
        .btn-save:hover { 
            background-color: #9edcc4; 
            transform: translateY(-2px);
        }
        .form-label { font-weight: 600; color: #555; }
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #eee;
            padding: 12px;
        }
    </style>
</head>
<body>

<div class="header-app text-center mb-4">
    <h2 class="fw-bold">AgroGestión</h2>
    <p class="mb-0">Control de Gastos de Inmuebles</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card card-custom p-4 shadow-sm">
                <h5 class="mb-4 text-muted border-bottom pb-2">Registrar Actividad Diaria</h5>
                <form id="agroForm">
                    <div class="mb-3">
                        <label class="form-label">Inmueble / Lote</label>
                        <select class="form-select" id="loteSelect" required>
                            <option value="" selected disabled>Seleccione un lote...</option>
                            <option value="Rolon Kue">Rolon Kue (40ha)</option>
                            <option value="Lote Central">Lote Central</option>
                            <option value="Potrero Norte">Potrero Norte</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de Plantación</label>
                        <input type="text" class="form-control" id="cultivo" placeholder="Ej: Yerba Mate, Maíz, Pasto" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría de Gasto</label>
                        <select class="form-select" id="gastoTipo" required>
                            <option value="Combustible">Combustible</option>
                            <option value="Fertilizante">Fertilizante</option>
                            <option value="Semillas">Semillas</option>
                            <option value="Limpieza">Limpieza de Lote</option>
                            <option value="Mano de Obra">Mano de Obra</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Monto de la Inversión</label>
                        <input type="number" class="form-control" id="monto" placeholder="Monto en Guaraníes o USD" required>
                    </div>

                    <button type="submit" id="btnGuardar" class="btn btn-save w-100 shadow-sm">
                        GUARDAR EN FIREBASE
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Tus credenciales de AgroGestión
  const firebaseConfig = {
    apiKey: "AIzaSyDow_HqFuXPHSEtaV2RsuqQuy6utIakOCo",
    authDomain: "agrogestion-163d2.firebaseapp.com",
    projectId: "agrogestion-163d2",
    storageBucket: "agrogestion-163d2.firebasestorage.app",
    messagingSenderId: "83410520563",
    appId: "1:83410520563:web:0de6a6b74d8adbc1206a86"
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById('agroForm');
  const btn = document.getElementById('btnGuardar');

  // Guardar datos al enviar el formulario
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    btn.disabled = true;
    btn.innerText = "PROCESANDO...";

    try {
      await addDoc(collection(db, "registros_campo"), {
        lote: document.getElementById('loteSelect').value,
        cultivo: document.getElementById('cultivo').value,
        categoria: document.getElementById('gastoTipo').value,
        monto: Number(document.getElementById('monto').value),
        fecha: new Date().toLocaleString()
      });

      alert("✅ ¡Registro exitoso, Leidyd!");
      form.reset();
    } catch (error) {
      console.error("Error al guardar: ", error);
      alert("Error de conexión. Revisa las Reglas de Firestore.");
    } finally {
      btn.disabled = false;
      btn.innerText = "GUARDAR EN FIREBASE";
    }
  });
</script>

</body>
</html>
