<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROGESTION Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #1b4332; /* Verde profundo del logo */
            --accent: #74c69d;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #2d4059;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        
        /* Header Premium */
        .header-elite { 
            background-color: var(--primary); 
            color: var(--white); 
            padding: 30px; 
            border-radius: 0 0 30px 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Tarjetas de Lotes */
        .lote-card { 
            border: none; 
            border-radius: 20px; 
            background: var(--white); 
            transition: 0.3s; 
            cursor: pointer;
            border-left: 6px solid var(--accent);
        }
        .lote-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* Estilos de botones y badges */
        .btn-elite { background-color: var(--primary); color: white; border-radius: 12px; font-weight: 600; padding: 10px 20px; }
        .btn-elite:hover { background-color: #2d6a4f; color: white; }
        .badge-hectarea { background-color: #e9f5ee; color: #1b4332; font-weight: bold; }

        /* Secciones ocultas para navegación */
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body>

<div class="header-elite text-center mb-4">
    <h1 class="fw-bold" style="letter-spacing: 3px;">AGROGESTION</h1>
    <p class="mb-0 opacity-75">Panel de Control de Producción</p>
</div>

<div class="container pb-5">
    
    <section id="dashboard" class="view-section active">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">Mis Lotes</h4>
            <button class="btn btn-elite" onclick="abrirModalLote()">+ Nuevo Lote</button>
        </div>
        
        <div class="row g-4" id="listaLotes">
            </div>
    </section>

    <section id="detalleLote" class="view-section">
        <button class="btn btn-sm btn-outline-secondary mb-3" onclick="irADashboard()"><i class="bi bi-arrow-left"></i> Volver</button>
        
        <div class="card lote-card p-4 mb-4">
            <div class="d-flex justify-content-between">
                <div>
                    <h2 class="fw-bold" id="detNombreLote">Nombre Lote</h2>
                    <span class="badge badge-hectarea" id="detHectareas">0 ha totales</span>
                </div>
                <div class="text-end">
                    <button class="btn btn-sm btn-light text-primary" onclick="editarLote()"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-light text-danger" onclick="borrarLote()"><i class="bi bi-trash"></i></button>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card card-premium p-4 border-0 rounded-4 shadow-sm bg-white mb-4">
                    <h5 class="fw-bold"><i class="bi bi-moisture text-success"></i> Ciclo Actual</h5>
                    <hr>
                    <div id="infoCiclo">
                        <p class="mb-1 text-muted small">Cultivo Sembrado:</p>
                        <h6 class="fw-bold" id="detCultivo">Ninguno</h6>
                        <p class="mb-1 text-muted small mt-3">Progreso de Cosecha:</p>
                        <div class="progress mb-2" style="height: 10px;">
                            <div id="progresoCosecha" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
                        </div>
                        <p class="small text-danger fw-bold" id="diasFaltantes">Días para cosecha: --</p>
                        <button class="btn btn-sm btn-outline-success w-100" onclick="nuevoCiclo()">Nueva Siembra / Editar Ciclo</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card card-premium p-4 border-0 rounded-4 shadow-sm bg-white">
                    <div class="d-flex justify-content-between">
                        <h5 class="fw-bold"><i class="bi bi-cash-coin text-primary"></i> Finanzas del Lote</h5>
                        <button class="btn btn-sm btn-primary" onclick="nuevoRegistroFinanciero()">+ Agregar</button>
                    </div>
                    <hr>
                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead>
                                <tr class="small text-muted">
                                    <th>Fecha</th>
                                    <th>Concepto</th>
                                    <th>Monto</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="tablaFinanzas" class="small">
                                </tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-between mt-3 p-2 bg-light rounded">
                        <span class="fw-bold">BALANCE NETO:</span>
                        <span class="fw-bold text-success" id="balanceNeto">$ 0</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, onSnapshot, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDow_HqFuXPHSEtaV2RsuqQuy6utIakOCo",
    authDomain: "agrogestion-163d2.firebaseapp.com",
    projectId: "agrogestion-163d2",
    storageBucket: "agrogestion-163d2.firebasestorage.app",
    messagingSenderId: "83410520563",
    appId: "1:83410520563:web:0de6a6b74d8adbc1206a86"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- NAVEGACIÓN ---
  window.irADashboard = () => {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.getElementById('dashboard').classList.add('active');
  };

  window.verLote = (id) => {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.getElementById('detalleLote').classList.add('active');
    // Aquí cargarías la info específica de ese ID desde Firebase
  };

  // --- LÓGICA DE FIREBASE (Escucha en tiempo real de lotes) ---
  onSnapshot(collection(db, "lotes"), (snapshot) => {
    const contenedor = document.getElementById('listaLotes');
    contenedor.innerHTML = '';
    snapshot.forEach((doc) => {
      const d = doc.data();
      contenedor.innerHTML += `
        <div class="col-md-4" onclick="verLote('${doc.id}')">
            <div class="card lote-card p-4">
                <div class="d-flex justify-content-between align-items-start">
                    <h5 class="fw-bold mb-1">${d.nombre}</h5>
                    <i class="bi bi-chevron-right text-muted"></i>
                </div>
                <p class="text-muted small mb-3">${d.hectareas} Hectáreas totales</p>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="badge bg-light text-success">Activo</span>
                    <span class="small text-muted">H. Plantadas: ${d.hectareasPlantadas || 0}</span>
                </div>
            </div>
        </div>
      `;
    });
  });

  // --- FUNCIONES PARA AGILIZAR (EDITAR Y BORRAR) ---
  window.borrarLote = async (id) => {
      if(confirm("¿Estás seguro de borrar este lote? Se perderá todo el historial.")) {
          await deleteDoc(doc(db, "lotes", id));
          irADashboard();
      }
  };

  // Base de datos de días de cosecha (para agilizar)
  const ciclosCultivo = {
      "soja": 120,
      "maiz": 150,
      "yerba": 365,
      "pasto": 60
  };

  // Cálculo automático de fecha de cosecha
  window.calcularCosecha = (cultivo, fechaSiembra) => {
      const dias = ciclosCultivo[cultivo.toLowerCase()] || 100;
      const fecha = new Date(fechaSiembra);
      fecha.setDate(fecha.getDate() + dias);
      return fecha.toLocaleDateString();
  };

</script>

<div class="modal fade" id="modalLote" tabindex="-1">
    </div>

</body>
</html>
