<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGROGESTION - Control de Precisión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --dark-green: #1b4332; --mid-green: #2d6a4f; --accent: #74c69d; --gold: #d4af37; --bg: #f0f2f5; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; display: flex; margin: 0; }
        .sidebar { width: 260px; background: var(--dark-green); min-height: 100vh; position: fixed; color: white; padding: 25px; }
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .card-agro { border: none; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); background: white; margin-bottom: 25px; }
        .btn-success { background: var(--mid-green); border: none; border-radius: 12px; padding: 12px 25px; font-weight: bold; }
        .modal-content { border: none; border-radius: 25px; }
        /* Tabla estilo Boutique */
        .table-historial tr { background: #f8f9fa; margin-bottom: 10px; display: table-row; }
        .table-historial td { padding: 15px; border-bottom: 5px solid white; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="text-center mb-5">
        <i class="bi bi-alpha" style="font-size: 3.5rem; color: var(--gold);"></i>
        <h4 class="fw-bold">AGROGESTION</h4>
    </div>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold m-0">Dashboard de Producción</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalLote">+ Nuevo Lote</button>
    </div>

    <div id="listaLotesDetallada"></div>
</div>

<div class="modal fade" id="modalHistorial" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0" id="historialTitulo">Extracto de Gastos</h5>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="descargarPDF()">
                        <i class="bi bi-file-earmark-pdf me-1"></i> PDF
                    </button>
                    <button class="btn btn-outline-success btn-sm rounded-pill" onclick="descargarExcel()">
                        <i class="bi bi-file-earmark-excel me-1"></i> Excel
                    </button>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-borderless table-historial">
                    <thead><tr class="text-muted small"><th>FECHA</th><th>CONCEPTO</th><th class="text-end">MONTO</th></tr></thead>
                    <tbody id="tablaCuerpoHistorial"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { /* Tu config de Firebase */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let datosActuales = [];
    let nombreLoteActual = "";

    // VER HISTORIAL
    window.verHistorialLote = async (id, nombre) => {
        nombreLoteActual = nombre;
        const q = query(collection(db, "gastos_detalle"), where("loteId", "==", id));
        const querySnapshot = await getDocs(q);
        const cuerpo = document.getElementById('tablaCuerpoHistorial');
        cuerpo.innerHTML = '';
        datosActuales = [];

        querySnapshot.forEach((gDoc) => {
            const g = gDoc.data();
            datosActuales.push([g.fecha, g.desc, `$ ${g.monto.toLocaleString()}`]);
            cuerpo.innerHTML += `
                <tr>
                    <td>${g.fecha}</td>
                    <td class="fw-bold">${g.desc}</td>
                    <td class="text-end text-danger fw-bold">- $ ${g.monto.toLocaleString()}</td>
                </tr>`;
        });
        new bootstrap.Modal(document.getElementById('modalHistorial')).show();
    };

    // EXPORTAR A EXCEL
    window.descargarExcel = () => {
        const ws = XLSX.utils.aoa_to_sheet([["Fecha", "Concepto", "Monto"], ...datosActuales]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Gastos");
        XLSX.utils.writeFile(wb, `Extracto_${nombreLoteActual}.xlsx`);
    };

    // EXPORTAR A PDF (Diseño AgroGestion)
    window.descargarPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Encabezado Verde Agro
        doc.setFillColor(27, 67, 50);
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("AGROGESTION PRO", 15, 25);
        doc.setFontSize(10);
        doc.text(`REPORTE DE GASTOS: ${nombreLoteActual.toUpperCase()}`, 15, 33);

        // Tabla de datos
        doc.autoTable({
            startY: 50,
            head: [['FECHA', 'CONCEPTO', 'MONTO']],
            body: datosActuales,
            headStyles: { fillColor: [45, 106, 79] },
            alternateRowStyles: { fillColor: [240, 242, 245] }
        });

        doc.save(`Extracto_${nombreLoteActual}.pdf`);
    };

    // [Resto de lógica de Snapshot para mostrar los lotes]
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
